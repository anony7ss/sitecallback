[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/oauth/callback"
  to = "/.netlify/functions/oauth-callback"
  status = 200

[[redirects]]
  from = "/oauth/health"
  to = "/.netlify/functions/oauth-health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
